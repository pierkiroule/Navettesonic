<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulation de Bulles - Navigation Organique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #030308;
            height: 100vh;
            width: 100vw;
            touch-action: none;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 100;
            color: rgba(255, 255, 255, 0.2);
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>

    <div id="ui">Touchez une bulle pour la déplacer</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let w, h;
        let isTethered = false;
        let draggedBubble = null;
        let mouseWorld = { x: 0, y: 0 };
        
        const ARENA_RADIUS = 2000;
        const BUBBLES = [];
        const NUM_BUBBLES = 25;
        
        const ship = {
            x: 0, y: 0,
            vx: 0, vy: 0,
            angle: 0,
            trail: [],
            maxTrail: 60,
            stiffness: 0.005,
            damping: 0.96,
            turnEase: 0.08,
            repulsionRadius: 100,
            repulsionStrength: 0.6
        };

        const camera = {
            x: 0, y: 0,
            targetX: 0, targetY: 0,
            ease: 0.05
        };

        function initBubbles() {
            for(let i=0; i<NUM_BUBBLES; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.sqrt(Math.random()) * (ARENA_RADIUS - 200);
                BUBBLES.push({
                    x: Math.cos(angle) * dist,
                    y: Math.sin(angle) * dist,
                    r: 50 + Math.random() * 60,
                    hue: 180 + Math.random() * 40,
                    isActive: false
                });
            }
        }

        function resize() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
        }

        window.addEventListener('resize', resize);
        resize();
        initBubbles();

        function getMousePos(e) {
            const sx = e.clientX || (e.touches && e.touches[0].clientX);
            const sy = e.clientY || (e.touches && e.touches[0].clientY);
            return {
                x: sx - w/2 + camera.x,
                y: sy - h/2 + camera.y
            };
        }

        // --- GESTION DES INPUTS ---

        function onStart(e) {
            const pos = getMousePos(e);
            mouseWorld = pos;
            
            // Vérifier si on a cliqué sur une bulle
            draggedBubble = BUBBLES.find(b => {
                const d = Math.hypot(pos.x - b.x, pos.y - b.y);
                return d < b.r;
            });

            if (draggedBubble) {
                draggedBubble.isActive = true;
                isTethered = false; // Désactive le guidage de la flèche
            } else {
                isTethered = true;
            }
        }

        function onMove(e) {
            const pos = getMousePos(e);
            mouseWorld = pos;
            if (draggedBubble) {
                draggedBubble.x = pos.x;
                draggedBubble.y = pos.y;
            }
        }

        function onEnd() {
            if (draggedBubble) draggedBubble.isActive = false;
            draggedBubble = null;
            isTethered = false;
        }

        window.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);
        
        window.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            onStart(e); 
        }, {passive:false});
        window.addEventListener('touchmove', (e) => { 
            e.preventDefault(); 
            onMove(e); 
        }, {passive:false});
        window.addEventListener('touchend', onEnd);

        // --- LOGIQUE ---

        function update() {
            // 1. Traction élastique (seulement si on ne dragge pas de bulle)
            if (isTethered && !draggedBubble) {
                const dx = mouseWorld.x - ship.x;
                const dy = mouseWorld.y - ship.y;
                ship.vx += dx * ship.stiffness;
                ship.vy += dy * ship.stiffness;
            }

            // 2. Évitement des bulles
            BUBBLES.forEach(b => {
                const dx = ship.x - b.x;
                const dy = ship.y - b.y;
                const dist = Math.hypot(dx, dy);
                const minDist = b.r + 25;

                if (dist < minDist + ship.repulsionRadius) {
                    const force = Math.pow(Math.max(0, (minDist + ship.repulsionRadius - dist) / ship.repulsionRadius), 2);
                    const nx = dx / dist;
                    const ny = dy / dist;

                    ship.vx += nx * force * ship.repulsionStrength;
                    ship.vy += ny * force * ship.repulsionStrength;

                    if (dist < minDist) {
                        const overlap = minDist - dist;
                        ship.x += nx * overlap;
                        ship.y += ny * overlap;
                        const dot = ship.vx * nx + ship.vy * ny;
                        if (dot < 0) {
                            ship.vx -= nx * dot * 0.7;
                            ship.vy -= ny * dot * 0.7;
                        }
                    }
                }
            });

            // Physique
            ship.vx *= ship.damping;
            ship.vy *= ship.damping;
            ship.x += ship.vx;
            ship.y += ship.vy;

            // Trail
            ship.trail.push({x: ship.x, y: ship.y});
            if(ship.trail.length > ship.maxTrail) ship.trail.shift();

            // Bordures
            const dCenter = Math.hypot(ship.x, ship.y);
            if (dCenter > ARENA_RADIUS) {
                const angle = Math.atan2(ship.y, ship.x);
                ship.x = Math.cos(angle) * ARENA_RADIUS;
                ship.y = Math.sin(angle) * ARENA_RADIUS;
                ship.vx *= -0.5; ship.vy *= -0.5;
            }

            // Orientation
            const speed = Math.hypot(ship.vx, ship.vy);
            if (speed > 0.2) {
                const angleVitesse = Math.atan2(ship.vy, ship.vx);
                let diff = angleVitesse - ship.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                ship.angle += diff * ship.turnEase;
            }

            // Caméra
            camera.targetX = ship.x + ship.vx * 15;
            camera.targetY = ship.y + ship.vy * 15;
            camera.x += (camera.targetX - camera.x) * camera.ease;
            camera.y += (camera.targetY - camera.y) * camera.ease;
        }

        // --- RENDU ---

        function draw() {
            ctx.fillStyle = '#030308';
            ctx.fillRect(0, 0, w, h);

            ctx.save();
            ctx.translate(w/2 - camera.x, h/2 - camera.y);

            // Arène
            ctx.beginPath();
            ctx.arc(0, 0, ARENA_RADIUS, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Bulles
            BUBBLES.forEach(b => {
                const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
                const opacityMult = b.isActive ? 2 : 1;
                const hue = b.isActive ? 0 : b.hue; // Devient rouge si draguée
                
                grad.addColorStop(0, `hsla(${hue}, 80%, 50%, 0)`);
                grad.addColorStop(0.8, `hsla(${hue}, 80%, 50%, ${0.05 * opacityMult})`);
                grad.addColorStop(1, `hsla(${hue}, 80%, 50%, ${0.2 * opacityMult})`);
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
                ctx.fill();
                
                ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${0.1 * opacityMult})`;
                ctx.lineWidth = b.isActive ? 3 : 1;
                ctx.stroke();

                if (b.isActive) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = `hsla(${hue}, 80%, 60%, 0.5)`;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            });

            // Trail
            if (ship.trail.length > 2) {
                ctx.beginPath();
                ctx.lineWidth = 2;
                for (let i = 0; i < ship.trail.length - 1; i++) {
                    const alpha = (i / ship.trail.length) * 0.4;
                    ctx.strokeStyle = `rgba(100, 200, 255, ${alpha})`;
                    ctx.moveTo(ship.trail[i].x, ship.trail[i].y);
                    ctx.lineTo(ship.trail[i+1].x, ship.trail[i+1].y);
                }
                ctx.stroke();
            }

            // Poisson minimaliste unicolore
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle + Math.PI / 2);
            const swimT = performance.now() * 0.006;
            const wag = Math.sin(swimT * 2.6) * 0.22;
            const finFlap = Math.sin(swimT * 1.8) * 0.18;
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'white';
            ctx.fillStyle = 'white';

            // Corps
            ctx.beginPath();
            ctx.ellipse(0, 0, 8, 14, 0, 0, Math.PI * 2);
            ctx.fill();

            // Nageoire gauche
            ctx.save();
            ctx.translate(-8, 0);
            ctx.rotate(-0.35 + finFlap);
            ctx.beginPath();
            ctx.moveTo(0, -1);
            ctx.quadraticCurveTo(-7, 4, -3, 11);
            ctx.quadraticCurveTo(1, 5, 0, -1);
            ctx.fill();
            ctx.restore();

            // Nageoire droite
            ctx.save();
            ctx.translate(8, 0);
            ctx.rotate(0.35 - finFlap);
            ctx.beginPath();
            ctx.moveTo(0, -1);
            ctx.quadraticCurveTo(7, 4, 3, 11);
            ctx.quadraticCurveTo(-1, 5, 0, -1);
            ctx.fill();
            ctx.restore();

            // Queue
            ctx.save();
            ctx.translate(0, 14);
            ctx.rotate(wag);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(-6, 6, -2, 14);
            ctx.quadraticCurveTo(0, 10, 2, 14);
            ctx.quadraticCurveTo(6, 6, 0, 0);
            ctx.fill();
            ctx.restore();

            // Yeux minimalistes (découpe dans la forme)
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#030308';
            ctx.beginPath();
            ctx.arc(-3, -8, 1.4, 0, Math.PI * 2);
            ctx.arc(3, -8, 1.4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
