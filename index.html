<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulation de Bulles - Navigation Organique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #030308;
            height: 100vh;
            width: 100vw;
            touch-action: none;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 100;
            color: rgba(255, 255, 255, 0.2);
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
        }
        #bubblePanel {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(3, 3, 8, 0.75);
            z-index: 200;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }
        #bubblePanel.hidden {
            display: none;
        }
        .panel-card {
            width: min(90vw, 380px);
            padding: 18px;
            border-radius: 16px;
            background: rgba(20, 24, 40, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #f0f6ff;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
        }
        .panel-card h2 {
            margin: 0 0 8px;
            font-size: 1.1rem;
        }
        .panel-card p {
            margin: 0 0 14px;
            font-size: 0.9rem;
            color: rgba(240, 246, 255, 0.75);
        }
        .panel-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }
        .panel-card button {
            border: 0;
            padding: 9px 12px;
            border-radius: 10px;
            background: rgba(84, 210, 255, 0.2);
            color: #dff7ff;
            cursor: pointer;
            font-weight: 600;
        }
        .panel-card button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .panel-card input[type="color"] {
            width: 52px;
            height: 34px;
            border: 0;
            border-radius: 6px;
            background: transparent;
        }
        #audioName {
            margin-top: 10px;
            font-size: 0.8rem;
            color: rgba(240, 246, 255, 0.8);
            min-height: 1.2em;
        }
        .hidden-input {
            display: none;
        }
    </style>
</head>
<body>

    <div id="ui">Double tap sur le poisson pour déposer une bulle sonore</div>
    <div id="bubblePanel" class="hidden">
        <div class="panel-card">
            <h2>Bulle sonore</h2>
            <p>Importez un son ou enregistrez-le, puis choisissez son style de bulle.</p>
            <div class="panel-row">
                <button id="importBtn" type="button">Importer audio</button>
                <button id="recordBtn" type="button">Enregistrer</button>
            </div>
            <div class="panel-row">
                <label for="bubbleDepth">Style</label>
                <select id="bubbleDepth">
                    <option value="deep">Bulle profonde (floue)</option>
                    <option value="surface">Bulle surface (nette)</option>
                </select>
            </div>
            <div id="audioName">Aucun son sélectionné</div>
            <div class="panel-row">
                <button id="cancelBtn" type="button">Annuler</button>
                <button id="dropBtn" type="button" disabled>Déposer la bulle</button>
            </div>
            <input id="audioInput" type="file" accept="audio/*" class="hidden-input">
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const ui = document.getElementById('ui');
        const bubblePanel = document.getElementById('bubblePanel');
        const importBtn = document.getElementById('importBtn');
        const recordBtn = document.getElementById('recordBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const dropBtn = document.getElementById('dropBtn');
        const audioInput = document.getElementById('audioInput');
        const bubbleDepth = document.getElementById('bubbleDepth');
        const audioName = document.getElementById('audioName');

        let w, h;
        let isTethered = false;
        let mouseWorld = { x: 0, y: 0 };
        let isInteractionPaused = false;
        let lastFishTap = { time: 0, x: 0, y: 0 };
        let activeAudioBlob = null;
        let recorder = null;
        let recordingChunks = [];
        let micStream = null;
        let pendingAudioName = '';
        let audioCtx = null;
        let masterGainNode = null;

        const ARENA_RADIUS = 2000;
        const SOUND_HEAR_RADIUS = 460;
        const Z_DEPTH = 140;
        const BUBBLES = [];
        const NUM_BUBBLES = 18;
        const WAKE_PARTICLES = [];
        const MAX_WAKE_PARTICLES = 5;

        const ship = {
            x: 0, y: 0,
            vx: 0, vy: 0,
            angle: 0,
            trail: [],
            maxTrail: 72,
            stiffness: 0.0026,
            damping: 0.93,
            turnEase: 0.06,
            repulsionRadius: 110,
            repulsionStrength: 0.38,
            maxSpeed: 3.1,
            wakeEmitter: 0
        };

        const camera = {
            x: 0, y: 0,
            targetX: 0, targetY: 0,
            ease: 0.05
        };

        function initBubbles() {
            for (let i = 0; i < NUM_BUBBLES; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.sqrt(Math.random()) * (ARENA_RADIUS - 220);
                BUBBLES.push({
                    x: Math.cos(angle) * dist,
                    y: Math.sin(angle) * dist,
                    r: 50 + Math.random() * 60,
                    depthMode: Math.random() < 0.5 ? 'deep' : 'surface',
                    isActive: false,
                    sound: null
                });
            }
        }

        function resize() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
        }

        window.addEventListener('resize', resize);
        resize();
        initBubbles();

        function getMousePos(e) {
            const sx = e.clientX ?? (e.touches && e.touches[0]?.clientX);
            const sy = e.clientY ?? (e.touches && e.touches[0]?.clientY);
            return {
                x: sx - w / 2 + camera.x,
                y: sy - h / 2 + camera.y
            };
        }

        function onStart(e) {
            if (isInteractionPaused) return;
            const pos = getMousePos(e);
            mouseWorld = pos;
            ensureAllAudioRunning();

            const fishTapDistance = Math.hypot(pos.x - ship.x, pos.y - ship.y);
            const now = performance.now();
            if (fishTapDistance < 28) {
                const isDoubleTap = now - lastFishTap.time < 330 && Math.hypot(pos.x - lastFishTap.x, pos.y - lastFishTap.y) < 40;
                lastFishTap = { time: now, x: pos.x, y: pos.y };
                if (isDoubleTap) {
                    openBubblePanel();
                    return;
                }
            }

            isTethered = true;
        }

        function onMove(e) {
            if (isInteractionPaused) return;
            mouseWorld = getMousePos(e);
        }

        function onEnd() {
            isTethered = false;
        }

        window.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);

        function isPanelInteractionTarget(target) {
            return bubblePanel.contains(target);
        }

        window.addEventListener('touchstart', (e) => {
            if (isPanelInteractionTarget(e.target)) return;
            e.preventDefault();
            onStart(e);
        }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (isPanelInteractionTarget(e.target)) return;
            e.preventDefault();
            onMove(e);
        }, { passive: false });
        window.addEventListener('touchend', onEnd);

        importBtn.addEventListener('click', () => audioInput.click());

        audioInput.addEventListener('change', () => {
            const file = audioInput.files?.[0];
            if (!file) return;
            activeAudioBlob = file;
            pendingAudioName = file.name;
            audioName.textContent = `Son sélectionné : ${file.name}`;
            dropBtn.disabled = false;
        });

        recordBtn.addEventListener('click', async () => {
            if (recorder && recorder.state === 'recording') {
                recorder.stop();
                return;
            }

            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                recordingChunks = [];
                recorder = new MediaRecorder(micStream);

                recorder.ondataavailable = (event) => {
                    if (event.data.size > 0) recordingChunks.push(event.data);
                };

                recorder.onstop = () => {
                    activeAudioBlob = new Blob(recordingChunks, { type: recorder.mimeType || 'audio/webm' });
                    pendingAudioName = `Enregistrement ${new Date().toLocaleTimeString('fr-FR')}`;
                    audioName.textContent = 'Enregistrement prêt';
                    dropBtn.disabled = false;
                    recordBtn.textContent = 'Enregistrer';
                    if (micStream) {
                        micStream.getTracks().forEach(track => track.stop());
                        micStream = null;
                    }
                };

                recorder.start();
                recordBtn.textContent = 'Arrêter';
                audioName.textContent = 'Enregistrement en cours...';
            } catch (error) {
                audioName.textContent = 'Micro non disponible';
            }
        });

        cancelBtn.addEventListener('click', closeBubblePanel);

        dropBtn.addEventListener('click', async () => {
            if (!activeAudioBlob) return;
            try {
                const bubble = await buildSoundBubble(activeAudioBlob, pendingAudioName, bubbleDepth.value);
                BUBBLES.push(bubble);
                closeBubblePanel();
            } catch (error) {
                audioName.textContent = 'Impossible de décoder ce son';
            }
        });

        function openBubblePanel() {
            isInteractionPaused = true;
            isTethered = false;
            ship.vx = 0;
            ship.vy = 0;
            bubblePanel.classList.remove('hidden');
            ui.textContent = 'Poisson stoppé • Choisissez votre bulle sonore';
        }

        function closeBubblePanel() {
            isInteractionPaused = false;
            bubblePanel.classList.add('hidden');
            activeAudioBlob = null;
            dropBtn.disabled = true;
            audioInput.value = '';
            audioName.textContent = 'Aucun son sélectionné';
            pendingAudioName = '';
            bubbleDepth.value = 'deep';

            if (recorder && recorder.state === 'recording') recorder.stop();
            recordBtn.textContent = 'Enregistrer';
            ui.textContent = 'Double tap sur le poisson pour déposer une bulle sonore';
        }

        function ensureAudioContext() {
            if (audioCtx) return audioCtx;
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return null;
            audioCtx = new AudioContextClass();
            masterGainNode = audioCtx.createGain();
            masterGainNode.gain.value = 1;
            masterGainNode.connect(audioCtx.destination);
            return audioCtx;
        }

        function depthModeToOffset(depthMode) {
            if (depthMode === 'deep') return -Z_DEPTH;
            if (depthMode === 'surface') return Z_DEPTH;
            return 0;
        }

        async function buildSoundBubble(audioBlob, bubbleLabel, depthMode = 'deep') {
            const mouthDistance = 20;
            const dirX = Math.cos(ship.angle - Math.PI / 2);
            const dirY = Math.sin(ship.angle - Math.PI / 2);
            let x = ship.x + dirX * mouthDistance;
            let y = ship.y + dirY * mouthDistance;
            const maxRadius = ARENA_RADIUS - 80;
            const distance = Math.hypot(x, y);
            if (distance > maxRadius) {
                x = (x / distance) * maxRadius;
                y = (y / distance) * maxRadius;
            }

            const sound = await createBinauralSound(audioBlob);

            const bubble = {
                x,
                y,
                r: 64,
                label: bubbleLabel || 'Audio',
                depthMode,
                depthOffset: depthModeToOffset(depthMode),
                isActive: false,
                sound,
                currentVolume: 0
            };

            ensureBubbleAudioRunning(bubble);
            return bubble;
        }

        async function createBinauralSound(audioBlob) {
            const ctx = ensureAudioContext();
            if (!ctx) return null;

            const arrayBuffer = await audioBlob.arrayBuffer();
            const audioBuffer = await ctx.decodeAudioData(arrayBuffer.slice(0));
            const source = ctx.createBufferSource();
            source.buffer = audioBuffer;
            source.loop = true;

            const distanceGain = ctx.createGain();
            distanceGain.gain.value = 0;

            const toneFilter = ctx.createBiquadFilter();
            toneFilter.type = 'lowpass';
            toneFilter.frequency.value = 12000;
            toneFilter.Q.value = 0.6;

            const panner = new PannerNode(ctx, {
                panningModel: 'HRTF',
                distanceModel: 'inverse',
                refDistance: 90,
                maxDistance: SOUND_HEAR_RADIUS * 2.2,
                rolloffFactor: 1.2,
                coneInnerAngle: 360,
                coneOuterAngle: 0,
                coneOuterGain: 1
            });

            source.connect(distanceGain);
            distanceGain.connect(toneFilter);
            toneFilter.connect(panner);
            panner.connect(masterGainNode);
            source.start();

            return {
                source,
                distanceGain,
                toneFilter,
                panner,
                isStarted: true
            };
        }

        function ensureBubbleAudioRunning(bubble) {
            if (!bubble.sound) return;
            if (!bubble.sound.isStarted) return;
        }

        function ensureAllAudioRunning() {
            const ctx = ensureAudioContext();
            if (ctx?.state === 'suspended') {
                ctx.resume().catch(() => {
                    // Certains navigateurs exigent une interaction explicite.
                });
            }
            BUBBLES.forEach(ensureBubbleAudioRunning);
        }

        function updateAudioListener() {
            if (!audioCtx) return;
            const listener = audioCtx.listener;
            const forwardX = Math.cos(ship.angle - Math.PI / 2);
            const forwardY = Math.sin(ship.angle - Math.PI / 2);

            if (listener.positionX) {
                listener.positionX.value = ship.x;
                listener.positionY.value = ship.y;
                listener.positionZ.value = 0;
                listener.forwardX.value = forwardX;
                listener.forwardY.value = forwardY;
                listener.forwardZ.value = 0;
                listener.upX.value = 0;
                listener.upY.value = 0;
                listener.upZ.value = 1;
            } else if (listener.setPosition && listener.setOrientation) {
                listener.setPosition(ship.x, ship.y, 0);
                listener.setOrientation(forwardX, forwardY, 0, 0, 0, 1);
            }
        }

        function update() {
            if (isTethered && !isInteractionPaused) {
                const dx = mouseWorld.x - ship.x;
                const dy = mouseWorld.y - ship.y;
                ship.vx += dx * ship.stiffness;
                ship.vy += dy * ship.stiffness;
            }

            BUBBLES.forEach(b => {
                const dx = ship.x - b.x;
                const dy = ship.y - b.y;
                const dz = (b.depthOffset ?? 0);
                const dist = Math.hypot(dx, dy);
                const dist3d = Math.sqrt(dx * dx + dy * dy + dz * dz);
                const minDist = b.r + 25;

                if (b.sound) {
                    const normalized = Math.max(0, 1 - (dist3d / SOUND_HEAR_RADIUS));
                    const targetVolume = Math.pow(normalized, 2);
                    b.currentVolume += (targetVolume - b.currentVolume) * 0.1;
                    const clampedVolume = Math.min(1, Math.max(0, b.currentVolume));
                    b.sound.distanceGain.gain.value = clampedVolume;

                    const angleToBubble = Math.atan2(b.y - ship.y, b.x - ship.x);
                    const relativeAngle = angleToBubble - (ship.angle - Math.PI / 2);
                    const front = Math.cos(relativeAngle);
                    const rearFactor = Math.min(1, Math.max(0, (1 - front) * 0.5));
                    const distFactor = Math.min(1, dist3d / SOUND_HEAR_RADIUS);
                    const cutoff = 12000 - (rearFactor * 7000) - (distFactor * 2600);
                    b.sound.toneFilter.frequency.value = Math.max(1800, cutoff);

                    if (b.sound.panner.positionX) {
                        b.sound.panner.positionX.value = b.x;
                        b.sound.panner.positionY.value = b.y;
                        b.sound.panner.positionZ.value = b.depthOffset ?? 0;
                    } else if (b.sound.panner.setPosition) {
                        b.sound.panner.setPosition(b.x, b.y, b.depthOffset ?? 0);
                    }
                    b.isActive = dist3d < SOUND_HEAR_RADIUS;
                } else {
                    b.isActive = false;
                }

            });

            ship.vx *= ship.damping;
            ship.vy *= ship.damping;

            const speed = Math.hypot(ship.vx, ship.vy);
            if (speed > ship.maxSpeed) {
                const ratio = ship.maxSpeed / speed;
                ship.vx *= ratio;
                ship.vy *= ratio;
            }

            ship.x += ship.vx;
            ship.y += ship.vy;

            ship.trail.push({ x: ship.x, y: ship.y });
            if (ship.trail.length > ship.maxTrail) ship.trail.shift();

            const dCenter = Math.hypot(ship.x, ship.y);
            if (dCenter > ARENA_RADIUS) {
                const angle = Math.atan2(ship.y, ship.x);
                ship.x = Math.cos(angle) * ARENA_RADIUS;
                ship.y = Math.sin(angle) * ARENA_RADIUS;
                ship.vx *= -0.5;
                ship.vy *= -0.5;
            }

            if (speed > 0.08) {
                const angleVitesse = Math.atan2(ship.vy, ship.vx);
                let diff = angleVitesse - ship.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                ship.angle += diff * ship.turnEase;
            }

            camera.targetX = ship.x + ship.vx * 10;
            camera.targetY = ship.y + ship.vy * 10;
            camera.x += (camera.targetX - camera.x) * camera.ease;
            camera.y += (camera.targetY - camera.y) * camera.ease;

            updateAudioListener();
            updateWakeParticles(speed);
        }

        function updateWakeParticles(speed) {
            const now = performance.now();
            const speedNorm = Math.min(1, speed / ship.maxSpeed);
            ship.wakeEmitter += 0.06 + speedNorm * 0.24;

            if (speed > 0.04) {
                const invSpeed = 1 / Math.max(0.0001, speed);
                const backX = -ship.vx * invSpeed;
                const backY = -ship.vy * invSpeed;
                const tailX = ship.x + backX * 14;
                const tailY = ship.y + backY * 14;
                const targetCount = Math.min(MAX_WAKE_PARTICLES, 3 + Math.round(speedNorm * 2));

                while (WAKE_PARTICLES.length < targetCount) {
                    spawnWakeParticle(tailX, tailY, backX, backY, now);
                }

                while (ship.wakeEmitter >= 1) {
                    ship.wakeEmitter -= 1;
                    if (WAKE_PARTICLES.length >= MAX_WAKE_PARTICLES) break;
                    spawnWakeParticle(tailX, tailY, backX, backY, now);
                }
            }

            for (let i = WAKE_PARTICLES.length - 1; i >= 0; i--) {
                const p = WAKE_PARTICLES[i];
                p.age = now - p.bornAt;
                const t = p.age / p.life;
                if (t >= 1) {
                    WAKE_PARTICLES.splice(i, 1);
                    continue;
                }

                p.vx *= 0.993;
                p.vy = p.vy * 0.992 - 0.01;
                p.x += p.vx;
                p.y += p.vy;
            }

            if (WAKE_PARTICLES.length > MAX_WAKE_PARTICLES) {
                WAKE_PARTICLES.splice(0, WAKE_PARTICLES.length - MAX_WAKE_PARTICLES);
            }
        }

        function spawnWakeParticle(tailX, tailY, backX, backY, now) {
            const jitter = 3 + Math.random() * 3;
            const tangentX = -backY;
            const tangentY = backX;
            WAKE_PARTICLES.push({
                x: tailX + tangentX * (Math.random() - 0.5) * jitter + backX * (Math.random() * 4),
                y: tailY + tangentY * (Math.random() - 0.5) * jitter + backY * (Math.random() * 4),
                vx: backX * (0.06 + Math.random() * 0.18) + tangentX * (Math.random() - 0.5) * 0.07,
                vy: backY * (0.06 + Math.random() * 0.18) + tangentY * (Math.random() - 0.5) * 0.07,
                age: 0,
                life: 520 + Math.random() * 260,
                size: 2 + Math.random() * 1.4,
                alpha: 0.32 + Math.random() * 0.2,
                bornAt: now
            });
        }

        function draw() {
            ctx.fillStyle = '#030308';
            ctx.fillRect(0, 0, w, h);

            ctx.save();
            ctx.translate(w / 2 - camera.x, h / 2 - camera.y);

            ctx.beginPath();
            ctx.arc(0, 0, ARENA_RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 2;
            ctx.stroke();

            const drawBubble = (b) => {
                const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
                const isDeep = b.depthMode === 'deep';
                const edgeOpacity = b.isActive ? (isDeep ? 0.35 : 0.58) : (isDeep ? 0.24 : 0.42);
                const midOpacity = b.isActive ? (isDeep ? 0.14 : 0.3) : (isDeep ? 0.08 : 0.2);
                const strokeOpacity = b.isActive ? (isDeep ? 0.3 : 0.68) : (isDeep ? 0.2 : 0.48);

                grad.addColorStop(0, 'rgba(110, 205, 255, 0)');
                grad.addColorStop(0.78, `rgba(110, 205, 255, ${midOpacity})`);
                grad.addColorStop(1, `rgba(110, 205, 255, ${edgeOpacity})`);

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = `rgba(178, 232, 255, ${strokeOpacity})`;
                ctx.lineWidth = b.isActive ? (isDeep ? 2 : 3) : (isDeep ? 1 : 2);
                ctx.stroke();

                if (b.label) {
                    ctx.save();
                    ctx.font = '600 12px system-ui, -apple-system, Segoe UI, Roboto, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = isDeep ? 'rgba(220, 245, 255, 0.72)' : 'rgba(232, 248, 255, 0.92)';
                    if (isDeep) ctx.filter = 'blur(0.8px)';
                    const maxWidth = b.r * 1.45;
                    ctx.fillText(b.label, b.x, b.y, maxWidth);
                    ctx.restore();
                }
            };

            BUBBLES.forEach((b) => {
                if (b.depthMode === 'surface') return;
                drawBubble(b);
            });

            drawWakeParticles();

            if (ship.trail.length > 2) {
                ctx.beginPath();
                ctx.lineWidth = 2;
                for (let i = 0; i < ship.trail.length - 1; i++) {
                    const alpha = (i / ship.trail.length) * 0.4;
                    ctx.strokeStyle = `rgba(100, 200, 255, ${alpha})`;
                    ctx.moveTo(ship.trail[i].x, ship.trail[i].y);
                    ctx.lineTo(ship.trail[i + 1].x, ship.trail[i + 1].y);
                }
                ctx.stroke();
            }

            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle + Math.PI / 2);
            const swimT = performance.now() * 0.001;
            const glide = Math.hypot(ship.vx, ship.vy) / ship.maxSpeed;
            const wag = Math.sin(swimT * 9.5) * (0.14 + glide * 0.18);
            const finFlap = Math.sin(swimT * 7.2 + 0.5) * (0.12 + glide * 0.08);
            const bodyBreath = Math.sin(swimT * 2.5) * 0.6;

            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(185, 245, 255, 0.55)';

            const bodyGrad = ctx.createLinearGradient(0, -18, 0, 24);
            bodyGrad.addColorStop(0, '#f6feff');
            bodyGrad.addColorStop(0.5, '#cdefff');
            bodyGrad.addColorStop(1, '#8fd9f6');
            ctx.fillStyle = bodyGrad;

            ctx.beginPath();
            ctx.moveTo(0, -17);
            ctx.bezierCurveTo(-8.5, -13, -11, -3 + bodyBreath, -9, 8);
            ctx.bezierCurveTo(-7, 15, -3, 19 + bodyBreath, 0, 21);
            ctx.bezierCurveTo(3, 19 + bodyBreath, 7, 15, 9, 8);
            ctx.bezierCurveTo(11, -3 + bodyBreath, 8.5, -13, 0, -17);
            ctx.closePath();
            ctx.fill();

            ctx.save();
            ctx.translate(-7, 2);
            ctx.rotate(-0.35 + finFlap);
            ctx.beginPath();
            ctx.moveTo(0, -1);
            ctx.quadraticCurveTo(-9, 2, -6, 12);
            ctx.quadraticCurveTo(-1, 7, 0, -1);
            ctx.fill();
            ctx.restore();

            ctx.save();
            ctx.translate(7, 2);
            ctx.rotate(0.35 - finFlap);
            ctx.beginPath();
            ctx.moveTo(0, -1);
            ctx.quadraticCurveTo(9, 2, 6, 12);
            ctx.quadraticCurveTo(1, 7, 0, -1);
            ctx.fill();
            ctx.restore();

            ctx.save();
            ctx.translate(0, 18);
            ctx.rotate(wag);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-7, 6, -8, 16, -2.2, 22);
            ctx.quadraticCurveTo(0, 18, 2.2, 22);
            ctx.bezierCurveTo(8, 16, 7, 6, 0, 0);
            ctx.fill();
            ctx.restore();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.42)';
            ctx.beginPath();
            ctx.ellipse(0, -7, 2.8, 5.4, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#062436';
            ctx.beginPath();
            ctx.arc(-2.2, -10, 1.35, 0, Math.PI * 2);
            ctx.arc(2.2, -10, 1.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            BUBBLES.forEach((b) => {
                if (b.depthMode !== 'surface') return;
                drawBubble(b);
            });

            ctx.restore();
        }

        function drawWakeParticles() {
            WAKE_PARTICLES.forEach((p) => {
                const t = p.age / p.life;
                const alpha = Math.max(0, 1 - t) * p.alpha;
                ctx.fillStyle = `rgba(205, 240, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
